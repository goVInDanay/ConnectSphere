server.port=8082
spring.application.name=post-service

spring.datasource.url=jdbc:mysql://localhost:3306/connectsphere_auth?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=connectsphere-super-secret-key-replace-in-production-use-openssl-rand-hex-64
jwt.access-token-expiry-ms=900000

services.auth-service.url=http://localhost:8081
services.follow-service.url=http://localhost:8084
services.notification-service.url=http://localhost:8086

logging.level.com.connectsphere=DEBUG
logging.level.org.springframework.security=INFO
