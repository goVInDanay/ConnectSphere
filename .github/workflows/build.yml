name: SonarQube

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze – ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: AuthService,         key: "com.connectsphere:AuthService" }
          - { name: PostService,          key: "com.connectsphere:PostService" }
          - { name: CommentService,       key: "com.connectsphere:CommentService" }
          - { name: LikeService,          key: "com.connectsphere:LikeService" }
          - { name: FollowService,        key: "com.connectsphere:FollowService" }
          - { name: NotificationService,  key: "com.connectsphere:NotificationService" }
          - { name: MediaService,         key: "com.connectsphere:MediaService" }
          - { name: SearchService,        key: "com.connectsphere:SearchService" }
          - { name: ApiGateway,           key: "com.connectsphere:ApiGateway" }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Verify token can reach SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Checking SonarCloud access..."
          curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/projects/search?organization=govindanay" \
            | grep -o '"total":[0-9]*'

      - name: Build and analyze – ${{ matrix.service.name }}
        working-directory: ${{ matrix.service.name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B package org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar \
            -DskipTests \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=govindanay \
            -Dsonar.projectKey=${{ matrix.service.key }} \
            -Dsonar.projectName="ConnectSphere ${{ matrix.service.name }}" \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}