server.port=8085
spring.application.name=follow-service

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/connectsphere_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT (only if you are still validating here)
jwt.secret=connectsphere-super-secret-key-replace-in-production-use-openssl-rand-hex-64

# External services
services.post-service.base-url=http://localhost:8082
services.comment-service.base-url=http://localhost:8083

logging.level.com.connectsphere=DEBUG

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true         

rabbitmq.exchange=notification.exchange
rabbitmq.queue=notification.queue
rabbitmq.routing.key=notification.routing