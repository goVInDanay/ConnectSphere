server.port=8086
spring.application.name=notification-service

spring.datasource.url=jdbc:mysql://localhost:3306/connectsphere_notification?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

jwt.secret=connectsphere-super-secret-key-replace-in-production-use-openssl-rand-hex-64

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=

app.frontend-base-url=http://localhost:3000

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

rabbitmq.exchange=notification.exchange
rabbitmq.queue=notification.queue
rabbitmq.routing.key=notification.routing

logging.level.com.connectsphere=DEBUG
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.web=INFO

