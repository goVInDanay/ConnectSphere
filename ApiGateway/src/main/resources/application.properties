server.port=8080

spring.application.name=api-gateway


spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**
spring.cloud.gateway.routes[0].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[0].filters[0].args.openPaths=POST:/api/auth/register,POST:/api/auth/login,POST:/api/auth/refresh,GET:/api/auth/search,GET:/api/auth/profile/**,GET:/api/auth/{id}/email,GET:/api/auth/profile/{userId},GET:/api/auth/username

spring.cloud.gateway.routes[1].id=post-service
spring.cloud.gateway.routes[1].uri=lb://post-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/posts/**,/api/posts/reports/**
spring.cloud.gateway.routes[1].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[1].filters[0].args.openPaths=GET:/api/posts/search,GET:/api/posts/{postId},GET:/api/posts/user/**,POST:/api/posts/*/likes/inc,POST:/api/posts/*/likes/dec,POST:/api/posts/*/comments/inc,POST:/api/posts/*/comments/dec

spring.cloud.gateway.routes[2].id=comment-service
spring.cloud.gateway.routes[2].uri=lb://comment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/comments/**
spring.cloud.gateway.routes[2].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[2].filters[0].args.openPaths=GET:/api/comments/post/**,GET:/api/comments/**,POST:/api/comments/*/like,POST:/api/comments/*/unlike,GET:/api/comments/post/*

spring.cloud.gateway.routes[3].id=like-service
spring.cloud.gateway.routes[3].uri=lb://like-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/likes/**
spring.cloud.gateway.routes[3].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[3].filters[0].args.openPaths=GET:/api/likes/target/**

spring.cloud.gateway.routes[4].id=media-service
spring.cloud.gateway.routes[4].uri=lb://media-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/media/**,/api/stories/**,/api/post/**
spring.cloud.gateway.routes[4].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[4].filters[0].args.openPaths=GET:/api/media/**,GET:/api/post/**,GET:/api/stories/feed,GET:/api/stories/**,GET:/uploads/**

spring.cloud.gateway.routes[5].id=media-static
spring.cloud.gateway.routes[5].uri=http://localhost:8087
spring.cloud.gateway.routes[5].predicates[0]=Path=/uploads/**

spring.cloud.gateway.routes[6].id=search-service
spring.cloud.gateway.routes[6].uri=lb://search-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/search/**,/api/hashtags/**
spring.cloud.gateway.routes[6].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[6].filters[0].args.openPaths=GET:/api/search/**,GET:/api/search/hashtags/**,GET:/api/search/posts/**,GET:/api/search/users/**,GET:/api/hashtags/**,GET:/api/hashtags/*/posts,GET:/api/hashtags/*/count

spring.cloud.gateway.routes[7].id=follow-service
spring.cloud.gateway.routes[7].uri=lb://follow-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/follows/**
spring.cloud.gateway.routes[7].filters[0].name=JwtAuthFilter
spring.cloud.gateway.routes[7].filters[0].args.openPaths=GET:/api/follows/*/followers,GET:/api/follows/*/following,GET:/api/follows/*/follower-count,GET:/api/follows/*/following-count

spring.cloud.gateway.routes[8].id=admin-post-service
spring.cloud.gateway.routes[8].uri=lb://post-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/admin/posts/**
spring.cloud.gateway.routes[8].filters[0].name=JwtAuthFilter

spring.cloud.gateway.routes[9].id=admin-user-service
spring.cloud.gateway.routes[9].uri=lb://auth-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/admin/users/**
spring.cloud.gateway.routes[9].filters[0].name=JwtAuthFilter

spring.cloud.gateway.routes[10].id=admin-comment-service
spring.cloud.gateway.routes[10].uri=lb://comment-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/admin/comments/**
spring.cloud.gateway.routes[10].filters[0].name=JwtAuthFilter

spring.cloud.gateway.routes[11].id=auth-swagger
spring.cloud.gateway.routes[11].uri=lb://auth-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/auth/swagger-ui/**,/auth/v3/api-docs/**

spring.cloud.gateway.routes[12].id=post-swagger
spring.cloud.gateway.routes[12].uri=lb://post-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/post/swagger-ui/**,/post/v3/api-docs/**

spring.cloud.gateway.routes[13].id=comment-swagger
spring.cloud.gateway.routes[13].uri=lb://comment-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/comment/swagger-ui/**,/comment/v3/api-docs/**

spring.cloud.gateway.routes[14].id=follow-swagger
spring.cloud.gateway.routes[14].uri=lb://follow-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/follow/swagger-ui/**,/follow/v3/api-docs/**

spring.cloud.gateway.routes[15].id=search-swagger
spring.cloud.gateway.routes[15].uri=lb://search-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/search/swagger-ui/**,/search/v3/api-docs/**

eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET}

logging.level.com.connectsphere.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=WARN