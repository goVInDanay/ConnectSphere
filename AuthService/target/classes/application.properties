server.port=8081
spring.application.name=auth-service

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/connectsphere_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=900000000
jwt.refresh-token-expiry=604800000

# OAuth (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@connectsphere.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.connectsphere=DEBUG
logging.level.org.springframework.security=INFO

jwt.cookie.access-token-name=cs_access_token
jwt.cookie.refresh-token-name=cs_refresh_token

jwt.cookie.secure=false
 
app.frontend-url=${FRONTEND_URL}
app.name=ConnectSphere

rabbitmq.exchange=notification.exchange
rabbitmq.queue=notification.queue
rabbitmq.routing.key=notification.routing