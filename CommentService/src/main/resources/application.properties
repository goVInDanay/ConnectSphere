server.port=8083
spring.application.name=comment-service

spring.datasource.url=jdbc:mysql://mysql-7981e4f-govindnacharya-2f14.h.aivencloud.com:17307/${AUTH_DB}?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=UTC
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true

jwt.secret=${JWT_SECRET}

logging.level.com.connectsphere=DEBUG

rabbitmq.exchange=${RABBITMQ_EXCHANGE}
rabbitmq.queue=${RABBITMQ_QUEUE}
rabbitmq.routing.key=${RABBITMQ_ROUTING_KEY}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

springdoc.api-docs.path=/v3/api-docs